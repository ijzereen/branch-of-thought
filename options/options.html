<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Branch of Thought 설정</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #1c1c1a;
        color: #f2eee4;
        max-width: 560px;
        margin: 40px auto;
        padding: 0 20px;
        line-height: 1.6;
      }
      h1 { font-size: 18px; }
      label { display: block; font-weight: 600; margin: 18px 0 6px; }
      input, select {
        width: 100%;
        padding: 8px 10px;
        border-radius: 6px;
        border: 1px solid #4a4a42;
        background: #26261f;
        color: #f2eee4;
        font-size: 13px;
      }
      .hint { color: #a09a8a; font-size: 12px; }
      button {
        margin-top: 20px;
        background: #d97757;
        border: none;
        color: #1c0d06;
        font-weight: 600;
        padding: 9px 16px;
        border-radius: 6px;
        cursor: pointer;
      }
      #status { margin-left: 12px; color: #8fce8f; font-size: 13px; }
      a { color: #d97757; }
    </style>
  </head>
  <body>
    <h1>Branch of Thought 설정</h1>
    <p class="hint">
      노드 제목을 Haiku로 요약하려면 Anthropic API 키가 필요합니다. 키와 요약 결과는
      이 브라우저에만 저장되며 외부로 전송되지 않습니다(요약 호출은 api.anthropic.com으로만 갑니다).
      키가 없으면 제목은 자동으로 원문을 잘라서 표시합니다.
    </p>

    <label for="key">Anthropic API 키</label>
    <input id="key" type="password" placeholder="sk-ant-..." autocomplete="off" />
    <p class="hint">
      <a href="https://console.anthropic.com/settings/keys" target="_blank"
        >console.anthropic.com</a
      >
      에서 발급.
    </p>

    <label for="model">요약 모델</label>
    <select id="model">
      <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 (권장·저렴)</option>
      <option value="claude-sonnet-5">Claude Sonnet 5</option>
    </select>

    <label>
      <input id="enabled" type="checkbox" style="width:auto" /> 요약 사용
    </label>

    <div>
      <button id="save">저장</button>
      <span id="status"></span>
    </div>

    <script src="options.js"></script>
  </body>
</html>

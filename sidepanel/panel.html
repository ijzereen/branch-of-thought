<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Branch of Thought</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <header id="toolbar">
      <div class="title">
        <span class="dot"></span>
        Branch of Thought
      </div>
      <div class="stats" id="stats"></div>
      <button id="fit" title="Fit to screen">⤢</button>
      <button id="reset" title="Reset layout">↺</button>
      <div class="menu">
        <button id="export-btn" title="Export">⤓</button>
        <div class="menu-list" id="export-menu" hidden>
          <button id="export-html">HTML (interactive)</button>
          <button id="export-png">PNG</button>
          <button id="export-svg">SVG</button>
        </div>
      </div>
      <button id="lang" title="Language">한국어</button>
      <button id="settings" title="Settings">⚙︎</button>
    </header>

    <div id="empty" class="empty">
      <p><b>Waiting for a conversation…</b></p>
      <p>
        Open or refresh a chat in <b>Claude</b> or <b>ChatGPT</b>, and the branch
        graph shows up here.
      </p>
      <p class="hint">
        Every edit starts a new branch; your current path is highlighted.
      </p>
    </div>

    <div id="graph-wrap" hidden>
      <svg id="graph" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <aside id="detail" hidden>
      <div id="detail-resize" title="위아래로 드래그해서 크기 조절"></div>
      <div class="detail-head">
        <span id="detail-sender" class="badge"></span>
        <span id="detail-time"></span>
        <button id="detail-max" title="크게 / 원래대로">⤢</button>
        <button id="detail-close">✕</button>
      </div>
      <div id="detail-scroll">
        <div id="detail-question" hidden>
          <div class="q-label" id="detail-question-label">질문</div>
          <div id="detail-question-text" class="md"></div>
        </div>
        <div id="detail-text" class="md"></div>
      </div>
    </aside>

    <script src="panel.js"></script>
  </body>
</html>
